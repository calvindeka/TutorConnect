name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  deploy:
    name: Deploy to Kenyon server
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: self-hosted
    steps:
      - name: Run deploy script
        run: |
          cd ~/sd/TutorConnect
          ./deploy.sh
