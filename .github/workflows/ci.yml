name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Backend + Frontend tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Install backend dependencies
        working-directory: server
        run: npm ci

      - name: Run backend tests
        working-directory: server
        run: npm test
        env:
          NODE_ENV: test
          # Tests don't touch the DB, but app.js still loads dotenv. Provide
          # a placeholder so the pool config validates.
          DB_HOST: localhost
          DB_PORT: "3306"
          DB_USER: ci
          DB_PASSWORD: ci
          DB_NAME: tutorconnect
          SESSION_SECRET: ci-secret

      - name: Install frontend dependencies
        working-directory: client
        run: npm ci

      - name: Run frontend tests
        working-directory: client
        run: npm test

      - name: Build frontend (verify production build still works)
        working-directory: client
        run: npm run build
